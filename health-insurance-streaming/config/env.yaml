active_environment: DEV

DEV:
  bootstrap_server: localhost:9092
  log_level: DEBUG

  default_record_count: 100

  null_percentage: 5
  garbage_percentage: 3

  schema_version: "1.0"

  source_system: "HEALTHCARE_SIMULATOR"

  scheduler:
    frequency_minutes: 10

  topics:

    patient_entry:
      topic_name: patient_entry_topic
      partitions: 3
      enabled: true

    patient_visit:
      topic_name: patient_visit_topic
      partitions: 3
      enabled: true

    diagnosis:
      topic_name: diagnosis_topic
      partitions: 3
      enabled: true

    lab_result:
      topic_name: lab_result_topic
      partitions: 3
      enabled: true

    pharmacy:
      topic_name: pharmacy_topic
      partitions: 3
      enabled: true

    health_claims:
      topic_name: health_claims_topic
      partitions: 3
      enabled: true

    insurance_claim:
      topic_name: insurance_claim_topic
      partitions: 3
      enabled: true

    critical_patient:
      topic_name: critical_patient_topic
      partitions: 3
      enabled: true

QA:
  bootstrap_server: qa-kafka:9092
  log_level: INFO

PROD:
  bootstrap_server: prod-kafka:9092
  log_level: ERROR